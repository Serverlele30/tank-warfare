<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tank Warfare - Multiplayer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        #gameCanvas {
            width: 100%;
            height: 100%;
            display: block;
            background: linear-gradient(180deg, #0a0a15 0%, #1a1a2e 100%);
            cursor: crosshair;
            touch-action: none;
        }

        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 20px;
            border-radius: 15px;
            color: white;
            border: 2px solid rgba(102, 126, 234, 0.6);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7),
                        inset 0 0 30px rgba(102, 126, 234, 0.1);
            animation: panelGlow 3s ease-in-out infinite;
        }

        @keyframes panelGlow {
            0%, 100% { box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7), inset 0 0 30px rgba(102, 126, 234, 0.1); }
            50% { box-shadow: 0 8px 32px rgba(102, 126, 234, 0.3), inset 0 0 30px rgba(102, 126, 234, 0.2); }
        }

        .health-bar {
            width: 250px;
            height: 32px;
            background: rgba(255, 0, 0, 0.15);
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid rgba(255, 50, 50, 0.5);
            margin-top: 10px;
            position: relative;
            box-shadow: inset 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff4444, #ff6b6b);
            transition: width 0.3s ease, background 0.3s ease;
            box-shadow: inset 0 0 20px rgba(255, 100, 100, 0.9);
            position: relative;
            overflow: hidden;
        }

        .health-fill::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: healthShine 2s infinite;
        }

        @keyframes healthShine {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        .health-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 13px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            pointer-events: none;
            color: #fff;
        }

        .score-display {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            color: #ffd700;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.9), 
                         0 0 15px rgba(255, 215, 0, 0.6),
                         0 0 30px rgba(255, 215, 0, 0.3);
        }

        .kills-display, .wave-display, .weapon-display, .combo-display {
            font-size: 15px;
            margin-top: 8px;
            font-weight: 500;
        }

        .kills-display {
            color: #ff6b6b;
            text-shadow: 0 0 10px rgba(255, 107, 107, 0.5);
        }

        .wave-display {
            color: #4ecdc4;
            text-shadow: 0 0 10px rgba(78, 205, 196, 0.5);
        }

        .weapon-display {
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.5);
        }

        .combo-display {
            color: #ff9ff3;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 159, 243, 0.5);
            animation: comboPulse 0.5s ease-in-out infinite;
        }

        @keyframes comboPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #leaderboard {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.9);
            padding: 18px;
            border-radius: 15px;
            color: white;
            min-width: 240px;
            max-height: 450px;
            overflow-y: auto;
            border: 2px solid rgba(102, 126, 234, 0.6);
            backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
        }

        #leaderboard h3 {
            margin-bottom: 15px;
            color: #ffd700;
            text-align: center;
            font-size: 20px;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
        }

        .leaderboard-entry {
            padding: 10px 12px;
            margin: 8px 0;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            transition: all 0.3s;
            border: 1px solid transparent;
        }

        .leaderboard-entry:hover {
            background: rgba(255, 255, 255, 0.12);
            transform: translateX(3px);
        }

        .leaderboard-entry.current {
            background: rgba(255, 215, 0, 0.3);
            border: 1px solid #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
            animation: currentPulse 2s ease-in-out infinite;
        }

        @keyframes currentPulse {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 215, 0, 0.4); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.6); }
        }

        .leaderboard-entry.bot {
            opacity: 0.7;
        }

        .bot-label {
            font-size: 11px;
            color: #aaa;
            margin-left: 5px;
        }

        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(15, 12, 41, 0.98), rgba(48, 43, 99, 0.98));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        #startScreen.hidden {
            display: none;
        }

        #startScreen h1 {
            font-size: clamp(48px, 8vw, 84px);
            color: #fff;
            margin-bottom: 20px;
            text-shadow: 0 0 30px #667eea, 0 0 60px #764ba2;
            animation: titleGlow 2s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { text-shadow: 0 0 30px #667eea, 0 0 60px #764ba2; }
            50% { text-shadow: 0 0 50px #667eea, 0 0 100px #764ba2, 0 0 120px #667eea; }
        }

        .multiplayer-badge {
            font-size: clamp(16px, 3vw, 24px);
            color: #4CAF50;
            margin-bottom: 30px;
            font-weight: bold;
            text-shadow: 0 0 15px #4CAF50;
            animation: badgePulse 1.5s ease-in-out infinite;
        }

        @keyframes badgePulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.85; transform: scale(1.08); }
        }

        #playerNameInput {
            padding: 18px 40px;
            font-size: clamp(16px, 3vw, 22px);
            border: 3px solid #667eea;
            border-radius: 15px;
            margin-bottom: 25px;
            background: rgba(102, 126, 234, 0.15);
            color: white;
            text-align: center;
            width: min(380px, 90vw);
            transition: all 0.3s;
        }

        #playerNameInput:focus {
            outline: none;
            border-color: #764ba2;
            box-shadow: 0 0 30px rgba(118, 75, 162, 0.6);
            transform: scale(1.05);
        }

        #playerNameInput::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        #startButton {
            padding: 18px 60px;
            font-size: clamp(20px, 4vw, 28px);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            box-shadow: 0 6px 30px rgba(102, 126, 234, 0.5);
            position: relative;
            overflow: hidden;
        }

        #startButton::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: rotate(45deg);
            animation: buttonShine 3s infinite;
        }

        @keyframes buttonShine {
            0% { left: -50%; }
            100% { left: 150%; }
        }

        #startButton:hover:not(:disabled) {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 10px 40px rgba(102, 126, 234, 0.7);
        }

        #startButton:active:not(:disabled) {
            transform: translateY(0) scale(1);
        }

        #startButton:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-text {
            margin-top: 20px;
            font-size: clamp(12px, 2vw, 16px);
            padding: 8px 16px;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.5);
        }

        .status-connected {
            color: #4CAF50;
        }

        .status-disconnected {
            color: #ff4444;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
            animation: statusBlink 1.5s infinite;
        }

        .status-connected .status-dot {
            background: #4CAF50;
            box-shadow: 0 0 10px #4CAF50;
        }

        .status-disconnected .status-dot {
            background: #ff4444;
            box-shadow: 0 0 10px #ff4444;
        }

        @keyframes statusBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        #gameOverScreen {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.95), rgba(30, 30, 60, 0.95));
            padding: 40px 50px;
            border-radius: 20px;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: all 0.4s;
            border: 3px solid #667eea;
            box-shadow: 0 0 60px rgba(102, 126, 234, 0.5);
            z-index: 500;
            max-width: min(500px, 90vw);
        }

        #gameOverScreen.show {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
            pointer-events: all;
        }

        #gameOverScreen h2 {
            color: #ff4444;
            font-size: clamp(32px, 5vw, 48px);
            margin-bottom: 25px;
            text-shadow: 0 0 20px #ff4444;
            animation: gameOverPulse 1s ease-in-out infinite;
        }

        @keyframes gameOverPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        #gameOverScreen .stats {
            color: #fff;
            font-size: clamp(16px, 3vw, 20px);
            margin: 15px 0;
        }

        #gameOverScreen .stats strong {
            color: #ffd700;
            font-size: clamp(20px, 4vw, 28px);
        }

        #restartButton {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: clamp(18px, 3vw, 24px);
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            box-shadow: 0 6px 25px rgba(76, 175, 80, 0.5);
        }

        #restartButton:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 35px rgba(76, 175, 80, 0.7);
        }

        #notification {
            position: absolute;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: rgba(0, 0, 0, 0.9);
            color: #fff;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: clamp(14px, 2.5vw, 18px);
            opacity: 0;
            transition: all 0.5s;
            pointer-events: none;
            z-index: 200;
            border: 2px solid rgba(102, 126, 234, 0.6);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.8);
        }

        #notification.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #soundToggle {
            position: absolute;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            border: 2px solid #667eea;
            border-radius: 10px;
            cursor: pointer;
            font-size: clamp(12px, 2vw, 16px);
            transition: all 0.3s;
            pointer-events: all;
        }

        #soundToggle:hover {
            background: rgba(102, 126, 234, 0.3);
            transform: scale(1.05);
        }

        /* Mobile controls */
        #mobileControls {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 0;
            right: 0;
            justify-content: space-between;
            padding: 0 20px;
            pointer-events: none;
            z-index: 100;
        }

        .mobile-joystick {
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            position: relative;
            pointer-events: all;
        }

        .mobile-joystick-inner {
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            transition: all 0.1s;
        }

        .mobile-fire-button {
            width: 100px;
            height: 100px;
            background: rgba(255, 0, 0, 0.4);
            border: 3px solid rgba(255, 0, 0, 0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            color: white;
            pointer-events: all;
            transition: all 0.2s;
        }

        .mobile-fire-button:active {
            background: rgba(255, 0, 0, 0.7);
            transform: scale(0.9);
        }

        @media (max-width: 768px) {
            #mobileControls {
                display: flex;
            }
            
            #gameCanvas {
                cursor: default;
            }
        }

        /* Minimap */
        #minimap {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 180px;
            height: 180px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid rgba(102, 126, 234, 0.6);
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
        }

        /* Loading animation */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Scrollbar styling */
        #leaderboard::-webkit-scrollbar {
            width: 8px;
        }

        #leaderboard::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 4px;
        }

        #leaderboard::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 4px;
        }

        #leaderboard::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.7);
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="hud">
            <div class="hud-panel">
                <div id="playerName" style="font-size: 16px; font-weight: bold; margin-bottom: 5px;">Spieler</div>
                <div class="health-bar">
                    <div class="health-fill" id="healthFill" style="width: 100%"></div>
                    <div class="health-text" id="healthText">100 / 100</div>
                </div>
                <div class="score-display">🏆 <span id="score">0</span></div>
                <div class="kills-display">💀 Kills: <span id="kills">0</span></div>
                <div class="wave-display">🌊 Welle: <span id="wave">1</span></div>
                <div class="weapon-display" id="weaponDisplay">⚡ Normal</div>
                <div class="combo-display" id="comboDisplay" style="display: none;">🔥 Combo x<span id="combo">0</span></div>
            </div>
        </div>

        <div id="leaderboard">
            <h3>🏆 Rangliste</h3>
            <div id="leaderboardList"></div>
        </div>

        <canvas id="minimap"></canvas>

        <div id="notification"></div>

        <div id="startScreen">
            <h1>⚔️ TANK WARFARE ⚔️</h1>
            <div class="multiplayer-badge">✨ Multiplayer Edition ✨</div>
            <input type="text" id="playerNameInput" placeholder="Dein Name" maxlength="15" autocomplete="off">
            <button id="startButton" disabled>
                <div class="loading"></div> Verbinde...
            </button>
            <div class="status-text status-disconnected" id="statusText">
                <span class="status-dot"></span>Verbinde zum Server...
            </div>
            <button id="soundToggle">🔊 Sound: AN</button>
        </div>

        <div id="gameOverScreen">
            <h2>☠️ GAME OVER ☠️</h2>
            <div class="stats">Score: <strong id="finalScore">0</strong></div>
            <div class="stats">Kills: <strong id="finalKills">0</strong></div>
            <div class="stats">Welle: <strong id="finalWave">1</strong></div>
            <div class="stats">Überlebenszeit: <strong id="survivalTime">0</strong>s</div>
            <div class="stats" id="killerInfo"></div>
            <button id="restartButton">🏠 Zurück zum Menü</button>
        </div>

        <div id="mobileControls">
            <div class="mobile-joystick" id="moveJoystick">
                <div class="mobile-joystick-inner" id="moveJoystickInner"></div>
            </div>
            <div class="mobile-fire-button" id="fireButton">🎯</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Initialize Socket.IO with HTTP Long Polling ONLY (no WebSocket)
        const socket = io({
            transports: ['polling'], // Force HTTP Long Polling
            upgrade: false, // Prevent upgrade to WebSocket
            reconnection: true,
            reconnectionDelay: 1000,
            reconnectionAttempts: 5
        });

        // Canvas setup
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        const minimapCanvas = document.getElementById('minimap');
        const minimapCtx = minimapCanvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            minimapCanvas.width = 180;
            minimapCanvas.height = 180;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game state
        let gameRunning = false;
        let gameStartTime = 0;
        let myPlayerId = null;
        let gameState = {
            players: [],
            bots: [],
            bullets: [],
            powerups: [],
            wave: 1
        };

        let WORLD_WIDTH = 3000;
        let WORLD_HEIGHT = 3000;
        let currentWave = 1;
        let soundEnabled = true;

        // Input
        const keys = { w: false, a: false, s: false, d: false, space: false };
        const mouse = { x: 0, y: 0, down: false };

        // Particles
        const particles = [];

        class Particle {
            constructor(x, y, color, vx, vy, size = 3, lifetime = 40) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.vx = vx;
                this.vy = vy;
                this.size = size;
                this.lifetime = lifetime;
                this.maxLifetime = lifetime;
                this.alpha = 1;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.15;
                this.vx *= 0.98;
                this.vy *= 0.98;
                this.lifetime--;
                this.alpha = this.lifetime / this.maxLifetime;
                this.size *= 0.97;
                return this.lifetime > 0;
            }

            draw(camX, camY) {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x - camX, this.y - camY, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        // Sound System
        const SoundSystem = {
            audioContext: null,
            
            init() {
                if (!this.audioContext) {
                    this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
            },

            playTone(frequency, duration, volume = 0.15, type = 'sine') {
                if (!soundEnabled) return;
                this.init();

                const oscillator = this.audioContext.createOscillator();
                const gainNode = this.audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(this.audioContext.destination);

                oscillator.frequency.value = frequency;
                oscillator.type = type;
                gainNode.gain.setValueAtTime(volume, this.audioContext.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);

                oscillator.start(this.audioContext.currentTime);
                oscillator.stop(this.audioContext.currentTime + duration);
            },

            playShoot() {
                this.playTone(800, 0.08, 0.1, 'square');
                setTimeout(() => this.playTone(600, 0.06, 0.08, 'square'), 30);
            },

            playExplosion() {
                this.playTone(150, 0.3, 0.2, 'sawtooth');
                setTimeout(() => this.playTone(100, 0.25, 0.15, 'sawtooth'), 50);
                setTimeout(() => this.playTone(50, 0.2, 0.12, 'sawtooth'), 100);
            },

            playHit() {
                this.playTone(400, 0.12, 0.15, 'square');
            },

            playPowerUp() {
                this.playTone(600, 0.1, 0.12);
                setTimeout(() => this.playTone(800, 0.1, 0.12), 80);
                setTimeout(() => this.playTone(1000, 0.15, 0.12), 160);
            },

            playKill() {
                this.playTone(300, 0.15, 0.18, 'sawtooth');
                setTimeout(() => this.playTone(200, 0.15, 0.15, 'sawtooth'), 100);
            },

            playWave() {
                this.playTone(400, 0.2, 0.15);
                setTimeout(() => this.playTone(600, 0.2, 0.15), 150);
                setTimeout(() => this.playTone(800, 0.25, 0.15), 300);
            }
        };

        // Effects
        function createExplosion(x, y, color) {
            for (let i = 0; i < 25; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 3 + Math.random() * 5;
                const size = 3 + Math.random() * 4;
                particles.push(new Particle(
                    x, y, color,
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    size, 50
                ));
            }
        }

        function createHitEffect(x, y) {
            for (let i = 0; i < 12; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 3;
                particles.push(new Particle(
                    x, y, '#ff' + Math.floor(Math.random() * 100) + '00',
                    Math.cos(angle) * speed,
                    Math.sin(angle) * speed,
                    2, 30
                ));
            }
        }

        function createTrailEffect(x, y, color) {
            if (Math.random() < 0.3) {
                particles.push(new Particle(
                    x + (Math.random() - 0.5) * 5,
                    y + (Math.random() - 0.5) * 5,
                    color,
                    (Math.random() - 0.5) * 0.5,
                    (Math.random() - 0.5) * 0.5,
                    2, 20
                ));
            }
        }

        // Notification system
        function showNotification(message) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.classList.add('show');
            setTimeout(() => notif.classList.remove('show'), 2500);
        }

        // Get player
        function getMyPlayer() {
            return gameState.players.find(p => p.id === myPlayerId);
        }

        // Update HUD
        function updateHUD() {
            const player = getMyPlayer();
            if (!player) return;

            const healthPercent = (player.health / player.maxHealth) * 100;
            document.getElementById('healthFill').style.width = healthPercent + '%';
            document.getElementById('healthText').textContent = `${Math.round(player.health)} / ${player.maxHealth}`;
            document.getElementById('score').textContent = player.score;
            document.getElementById('kills').textContent = player.kills;
            document.getElementById('wave').textContent = currentWave;

            // Health bar color change
            const healthFill = document.getElementById('healthFill');
            if (healthPercent > 60) {
                healthFill.style.background = 'linear-gradient(90deg, #00ff00, #44ff44, #88ff88)';
            } else if (healthPercent > 30) {
                healthFill.style.background = 'linear-gradient(90deg, #ffaa00, #ffcc44)';
            } else {
                healthFill.style.background = 'linear-gradient(90deg, #ff0000, #ff4444, #ff6b6b)';
            }

            // Weapon display
            const weaponIcons = {
                normal: '⚡ Normal',
                rapid: '⚡⚡ Schnellfeuer',
                shotgun: '💥 Schrotflinte'
            };
            document.getElementById('weaponDisplay').textContent = weaponIcons[player.weaponType] || '⚡ Normal';

            // Combo display
            if (player.combo > 1) {
                document.getElementById('comboDisplay').style.display = 'block';
                document.getElementById('combo').textContent = player.combo;
            } else {
                document.getElementById('comboDisplay').style.display = 'none';
            }
        }

        // Update Leaderboard
        function updateLeaderboard() {
            const allEntities = [...gameState.players, ...gameState.bots]
                .sort((a, b) => b.score - a.score)
                .slice(0, 10);

            const listHtml = allEntities.map(entity => {
                const isMe = entity.id === myPlayerId;
                const botLabel = entity.isBot ? '<span class="bot-label">[BOT]</span>' : '';
                return `
                    <div class="leaderboard-entry ${isMe ? 'current' : ''} ${entity.isBot ? 'bot' : ''}">
                        <span>${entity.name}${botLabel}</span>
                        <span>${entity.score}</span>
                    </div>
                `;
            }).join('');

            document.getElementById('leaderboardList').innerHTML = listHtml;
        }

        // Draw minimap
        function drawMinimap() {
            const scale = minimapCanvas.width / WORLD_WIDTH;
            minimapCtx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            minimapCtx.fillRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            // Draw border
            minimapCtx.strokeStyle = '#667eea';
            minimapCtx.lineWidth = 2;
            minimapCtx.strokeRect(0, 0, minimapCanvas.width, minimapCanvas.height);

            // Draw all entities
            [...gameState.players, ...gameState.bots].forEach(entity => {
                minimapCtx.fillStyle = entity.id === myPlayerId ? '#00ff00' : entity.color;
                const x = entity.x * scale;
                const y = entity.y * scale;
                minimapCtx.beginPath();
                minimapCtx.arc(x, y, entity.id === myPlayerId ? 4 : 3, 0, Math.PI * 2);
                minimapCtx.fill();
            });

            // Draw powerups
            gameState.powerups.forEach(powerup => {
                minimapCtx.fillStyle = '#ffff00';
                minimapCtx.fillRect(powerup.x * scale - 2, powerup.y * scale - 2, 4, 4);
            });
        }

        // Drawing functions
        function drawGrid(camX, camY) {
            const gridSize = 100;
            const startX = Math.floor(camX / gridSize) * gridSize;
            const startY = Math.floor(camY / gridSize) * gridSize;

            ctx.strokeStyle = 'rgba(102, 126, 234, 0.1)';
            ctx.lineWidth = 1;

            for (let x = startX; x < camX + canvas.width; x += gridSize) {
                ctx.beginPath();
                ctx.moveTo(x - camX, 0);
                ctx.lineTo(x - camX, canvas.height);
                ctx.stroke();
            }

            for (let y = startY; y < camY + canvas.height; y += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, y - camY);
                ctx.lineTo(canvas.width, y - camY);
                ctx.stroke();
            }
        }

        function drawPlayer(player, camX, camY) {
            const x = player.x - camX;
            const y = player.y - camY;
            const size = 30;

            // Shield effect
            if (player.shield) {
                ctx.strokeStyle = 'rgba(0, 200, 255, 0.6)';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00c8ff';
                ctx.beginPath();
                ctx.arc(x, y, size + 6, 0, Math.PI * 2);
                ctx.stroke();
                ctx.shadowBlur = 0;
            }

            // Simple tank body
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(player.angle);

            // Tank body - simple rectangle
            ctx.fillStyle = player.color;
            ctx.fillRect(-size * 0.8, -size * 0.8, size * 1.6, size * 1.6);

            // Tank barrel - simple line
            ctx.strokeStyle = player.color;
            ctx.lineWidth = 6;
            ctx.beginPath();
            ctx.moveTo(0, 0);
            ctx.lineTo(size * 1.2, 0);
            ctx.stroke();

            ctx.restore();

            // Health bar
            const barWidth = 50;
            const barHeight = 6;
            const healthPercent = player.health / player.maxHealth;

            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(x - barWidth / 2, y - size - 15, barWidth, barHeight);

            if (healthPercent > 0.6) {
                ctx.fillStyle = '#00ff00';
            } else if (healthPercent > 0.3) {
                ctx.fillStyle = '#ffaa00';
            } else {
                ctx.fillStyle = '#ff0000';
            }
            ctx.fillRect(x - barWidth / 2, y - size - 15, barWidth * healthPercent, barHeight);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.lineWidth = 1;
            ctx.strokeRect(x - barWidth / 2, y - size - 15, barWidth, barHeight);

            // Name tag
            ctx.font = 'bold 11px Arial';
            ctx.fillStyle = player.id === myPlayerId ? '#00ff00' : '#ffffff';
            ctx.textAlign = 'center';
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.lineWidth = 2;
            ctx.strokeText(player.name, x, y - size - 22);
            ctx.fillText(player.name, x, y - size - 22);
        }

        function drawBullet(bullet, camX, camY) {
            const x = bullet.x - camX;
            const y = bullet.y - camY;

            ctx.save();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ffff00';

            const gradient = ctx.createRadialGradient(x, y, 0, x, y, 6);
            gradient.addColorStop(0, '#ffff00');
            gradient.addColorStop(0.5, '#ff8800');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;

            ctx.beginPath();
            ctx.arc(x, y, 6, 0, Math.PI * 2);
            ctx.fill();

            // Inner glow
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(x, y, 3, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Trail
            createTrailEffect(bullet.x, bullet.y, '#ff8800');
        }

        function drawPowerUp(powerup, camX, camY) {
            const x = powerup.x - camX;
            const y = powerup.y - camY;
            const size = 20 + (powerup.pulse * 8);

            const colors = {
                health: '#ff0000',
                shield: '#00c8ff',
                rapid: '#ffff00',
                shotgun: '#ff8800',
                damage: '#ff00ff',
                speed: '#00ff00',
                regen: '#00ffaa',
                maxhealth: '#ff0088'
            };

            const icons = {
                health: '❤️',
                shield: '🛡️',
                rapid: '⚡',
                shotgun: '💥',
                damage: '💪',
                speed: '🏃',
                regen: '💚',
                maxhealth: '💗'
            };

            const color = colors[powerup.type] || '#ffffff';

            // Glow effect
            ctx.save();
            ctx.shadowBlur = 20 + (powerup.pulse * 10);
            ctx.shadowColor = color;

            // Outer ring
            ctx.strokeStyle = color;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x, y, size + 5, 0, Math.PI * 2);
            ctx.stroke();

            // Inner circle
            const gradient = ctx.createRadialGradient(x, y, 0, x, y, size);
            gradient.addColorStop(0, color);
            gradient.addColorStop(1, color + '40');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.fill();

            ctx.shadowBlur = 0;

            // Icon
            ctx.font = 'bold 24px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillStyle = '#ffffff';
            ctx.fillText(icons[powerup.type] || '?', x, y);

            ctx.restore();
        }

        // Game loop
        function gameLoop() {
            if (!gameRunning) return;

            const player = getMyPlayer();
            if (!player) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Calculate movement
            if (keys.w || keys.a || keys.s || keys.d) {
                let moveX = 0, moveY = 0;
                if (keys.w) moveY -= 1;
                if (keys.s) moveY += 1;
                if (keys.a) moveX -= 1;
                if (keys.d) moveX += 1;

                const dist = Math.hypot(moveX, moveY);
                if (dist > 0) {
                    moveX /= dist;
                    moveY /= dist;
                }

                const speed = 180;
                player.targetX = player.x + moveX * speed;
                player.targetY = player.y + moveY * speed;
            }

            // Aim
            const camera = {
                x: player.x - canvas.width / 2,
                y: player.y - canvas.height / 2
            };

            player.angle = Math.atan2(
                mouse.y - canvas.height / 2,
                mouse.x - canvas.width / 2
            );

            // Send update
            socket.emit('updatePlayer', {
                targetX: player.targetX,
                targetY: player.targetY,
                angle: player.angle
            });

            // Render with zoom
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Apply zoom - zoom out to see more
            ctx.save();
            const zoomLevel = 0.7; // 0.7 = zoomed out (see more), 1.0 = normal
            ctx.translate(canvas.width / 2, canvas.height / 2);
            ctx.scale(zoomLevel, zoomLevel);
            ctx.translate(-canvas.width / 2, -canvas.height / 2);

            drawGrid(camera.x, camera.y);

            // Draw world bounds
            ctx.strokeStyle = 'rgba(255, 0, 0, 0.3)';
            ctx.lineWidth = 5;
            ctx.strokeRect(-camera.x, -camera.y, WORLD_WIDTH, WORLD_HEIGHT);

            // Draw powerups
            gameState.powerups.forEach(p => drawPowerUp(p, camera.x, camera.y));

            // Draw all players and bots
            [...gameState.players, ...gameState.bots].forEach(p => drawPlayer(p, camera.x, camera.y));

            // Draw bullets
            gameState.bullets.forEach(b => drawBullet(b, camera.x, camera.y));

            // Draw particles
            for (let i = particles.length - 1; i >= 0; i--) {
                if (!particles[i].update()) {
                    particles.splice(i, 1);
                } else {
                    particles[i].draw(camera.x, camera.y);
                }
            }

            // Restore context (end zoom)
            ctx.restore();

            // crosshair (drawn without zoom)
            const crosshairSize = 14;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 2.5;
            ctx.shadowColor = '#000';
            ctx.shadowBlur = 4;
            ctx.beginPath();
            ctx.moveTo(mouse.x - crosshairSize, mouse.y);
            ctx.lineTo(mouse.x + crosshairSize, mouse.y);
            ctx.moveTo(mouse.x, mouse.y - crosshairSize);
            ctx.lineTo(mouse.x, mouse.y + crosshairSize);
            ctx.stroke();
            ctx.shadowBlur = 0;

            // Crosshair center
            ctx.fillStyle = '#ff0000';
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 3, 0, Math.PI * 2);
            ctx.fill();

            // Outer crosshair ring
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.5)';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(mouse.x, mouse.y, 20, 0, Math.PI * 2);
            ctx.stroke();

            updateHUD();
            updateLeaderboard();
            drawMinimap();

            requestAnimationFrame(gameLoop);
        }

        // Game Over
        function gameOver(score, kills, killerName) {
            gameRunning = false;
            const survivalTime = Math.floor((Date.now() - gameStartTime) / 1000);
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('survivalTime').textContent = survivalTime;
            document.getElementById('finalWave').textContent = currentWave;
            
            if (killerName) {
                document.getElementById('killerInfo').textContent = `☠️ Getötet von: ${killerName}`;
            }
            
            document.getElementById('gameOverScreen').classList.add('show');
        }

        // Start Game
        function startGame() {
            const playerName = document.getElementById('playerNameInput').value.trim() || 'Spieler';
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('playerName').textContent = playerName;
            
            socket.emit('joinGame', { name: playerName });
            
            gameRunning = true;
            gameStartTime = Date.now();
            gameLoop();
        }

        // Restart - go back to main menu
        function restart() {
            document.getElementById('gameOverScreen').classList.remove('show');
            document.getElementById('startScreen').classList.remove('hidden');
            document.getElementById('killerInfo').textContent = '';
            particles.length = 0;
            gameRunning = false;
            myPlayerId = null;
        }

        // Socket Events
        socket.on('connect', () => {
            console.log('✅ Connected via HTTP Long Polling!');
            document.getElementById('statusText').innerHTML = '<span class="status-dot"></span>Verbunden (HTTP Polling)';
            document.getElementById('statusText').className = 'status-text status-connected';
            document.getElementById('startButton').disabled = false;
            document.getElementById('startButton').innerHTML = 'START SPIEL';
        });

        socket.on('disconnect', () => {
            console.log('❌ Disconnected');
            document.getElementById('statusText').innerHTML = '<span class="status-dot"></span>Verbindung verloren';
            document.getElementById('statusText').className = 'status-text status-disconnected';
        });

        socket.on('connect_error', (error) => {
            console.error('Connection error:', error);
        });

        socket.on('initGame', (data) => {
            myPlayerId = data.playerId;
            gameState.players = data.players;
            gameState.bots = data.bots;
            gameState.bullets = data.bullets;
            gameState.powerups = data.powerups;
            gameState.wave = data.wave;
            currentWave = data.wave;
            
            if (data.worldWidth) WORLD_WIDTH = data.worldWidth;
            if (data.worldHeight) WORLD_HEIGHT = data.worldHeight;
            
            console.log('🎮 Game initialized! ID:', myPlayerId);
        });

        socket.on('gameState', (state) => {
            gameState = state;
            currentWave = state.wave;
        });

        socket.on('playerJoined', (player) => {
            console.log('👤 Player joined:', player.name);
            showNotification(`${player.name} ist beigetreten!`);
        });

        socket.on('playerLeft', (playerId) => {
            console.log('👋 Player left:', playerId);
        });

        socket.on('playerDied', (data) => {
            SoundSystem.playExplosion();
            const player = getMyPlayer();
            if (player) {
                createExplosion(player.x, player.y, player.color);
            }
            gameOver(data.score, data.kills, data.killerName);
        });

        socket.on('powerUpCollected', (data) => {
            SoundSystem.playPowerUp();
            if (data.playerId !== myPlayerId && gameState.powerups[data.index]) {
                const powerup = gameState.powerups[data.index];
                createHitEffect(powerup.x, powerup.y);
            }
        });

        socket.on('powerUpApplied', (data) => {
            const names = {
                health: '❤️ Gesundheit +60',
                shield: '🛡️ Schild 7s',
                rapid: '⚡ Schnellfeuer 12s',
                shotgun: '💥 Schrotflinte 10s',
                damage: '💪 Doppelschaden 10s',
                speed: '🏃 Geschwindigkeit 8s',
                regen: '💚 Regeneration 12s',
                maxhealth: '💗 +25 Max HP'
            };
            showNotification(`Power-Up: ${names[data.type] || data.type}`);
        });

        socket.on('playerHit', (data) => {
            SoundSystem.playHit();
            const player = getMyPlayer();
            if (player) {
                createHitEffect(player.x, player.y);
            }
        });

        socket.on('playerKilled', (data) => {
            SoundSystem.playKill();
            showNotification(`💀 ${data.victimName} eliminiert!`);
        });

        socket.on('newWave', (data) => {
            currentWave = data.wave;
            SoundSystem.playWave();
            showNotification(`🌊 WELLE ${data.wave}!`);
        });

        socket.on('botSpawned', (bot) => {
            console.log('🤖 Bot spawned:', bot.name);
        });

        socket.on('botDestroyed', (data) => {
            const bot = gameState.bots.find(b => b.id === data.botId);
            if (bot) {
                createExplosion(bot.x, bot.y, bot.color);
            }
        });

        // Event Listeners
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        document.addEventListener('keydown', e => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = true;
            if (key === 'a') keys.a = true;
            if (key === 's') keys.s = true;
            if (key === 'd') keys.d = true;
            if (key === ' ') {
                e.preventDefault();
                if (!keys.space && gameRunning) {
                    keys.space = true;
                    socket.emit('shoot');
                    SoundSystem.playShoot();
                }
            }
        });

        document.addEventListener('keyup', e => {
            const key = e.key.toLowerCase();
            if (key === 'w') keys.w = false;
            if (key === 'a') keys.a = false;
            if (key === 's') keys.s = false;
            if (key === 'd') keys.d = false;
            if (key === ' ') keys.space = false;
        });

        canvas.addEventListener('mousedown', () => {
            mouse.down = true;
            if (gameRunning) {
                socket.emit('shoot');
                SoundSystem.playShoot();
            }
        });

        canvas.addEventListener('mouseup', () => mouse.down = false);

        // Continuous shooting
        setInterval(() => {
            if ((mouse.down || keys.space) && gameRunning) {
                socket.emit('shoot');
                SoundSystem.playShoot();
            }
        }, 200);

        // Mobile touch controls
        let touchStartX = 0, touchStartY = 0;
        let isTouching = false;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            touchStartX = touch.clientX;
            touchStartY = touch.clientY;
            isTouching = true;

            // Fire on tap
            if (gameRunning) {
                socket.emit('shoot');
                SoundSystem.playShoot();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isTouching) return;

            const touch = e.touches[0];
            const player = getMyPlayer();
            if (!player) return;

            // Calculate movement direction
            const dx = touch.clientX - touchStartX;
            const dy = touch.clientY - touchStartY;
            const dist = Math.hypot(dx, dy);

            if (dist > 20) {
                const moveX = dx / dist;
                const moveY = dy / dist;
                const speed = 200;

                player.targetX = player.x + moveX * speed;
                player.targetY = player.y + moveY * speed;
            }

            // Update aim
            const rect = canvas.getBoundingClientRect();
            mouse.x = touch.clientX - rect.left;
            mouse.y = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchend', () => {
            isTouching = false;
        });

        // UI Buttons
        document.getElementById('startButton').addEventListener('click', startGame);
        document.getElementById('restartButton').addEventListener('click', restart);

        document.getElementById('playerNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter' && !document.getElementById('startButton').disabled) {
                startGame();
            }
        });

        document.getElementById('soundToggle').addEventListener('click', () => {
            soundEnabled = !soundEnabled;
            document.getElementById('soundToggle').textContent = soundEnabled ? '🔊 Sound: AN' : '🔇 Sound: AUS';
            if (soundEnabled) {
                SoundSystem.playPowerUp();
            }
        });

        // Prevent context menu
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        console.log('🎮 Tank Warfare - Ready!');
        console.log('🔒 Using HTTP Long Polling (no WebSocket)');
    </script>
</body>
</html>
